<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES NEON THEME --- */
        :root {
            --bg-color: #050509;
            --card-bg: rgba(20, 20, 35, 0.6);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --neon-blue: #00f2fe;
            --neon-purple: #4facfe;
            --neon-green: #0ff0b3;
            --border-neon: rgba(0, 242, 254, 0.3);
            
            --font-tech: 'Orbitron', sans-serif;
            --font-main: 'Rajdhani', sans-serif;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background: linear-gradient(-45deg, #050509, #121225, #050509, #1a1a3a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- LAYOUT DU DASHBOARD --- */
        .dashboard {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            position: relative;
        }

        /* --- CARTE CYBER --- */
        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 4px;
            padding: 25px;
            border: 1px solid var(--border-neon);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 15px;
            height: 15px;
            background: var(--neon-blue);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            opacity: 0.8;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }

        /* --- BLOC HORLOGE (2 colonnes) --- */
        .clock-card {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            border-left: 3px solid var(--neon-blue);
        }

        #time {
            font-family: var(--font-tech);
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        #date {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- BLOC SYSTEM STATUS (1 colonne) --- */
        .status-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .status-title {
            font-family: var(--font-tech);
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .status-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(15, 240, 179, 0.4);
            position: relative;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(15, 240, 179, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(15, 240, 179, 0); }
            100% { box-shadow: 0 0 0 0 rgba(15, 240, 179, 0); }
        }
        
        .status-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-icon {
            font-size: 1.3rem;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* --- WEATHER / DATA (1 colonne) --- */
        .data-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 3px solid var(--neon-purple);
        }
        
        .data-header {
            font-family: var(--font-tech);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .data-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--neon-purple);
        }
        
        .data-sub {
            color: var(--neon-purple);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* --- BARRE DE RECHERCHE CYBER (4 colonnes) --- */
        .search-card {
            grid-column: span 4;
            padding: 20px;
            background: rgba(10, 10, 20, 0.8);
        }

        .search-form {
            display: flex;
            gap: 15px;
        }

        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 15px 25px;
            border-radius: 2px;
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2) inset;
        }

        .search-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-tech);
            padding: 0 35px;
            border-radius: 2px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .search-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- RACCOURCIS / GRID LINKS (3 colonnes) --- */
        .links-card {
            grid-column: span 3;
        }

        .links-card h3 {
            font-family: var(--font-tech);
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-neon);
            padding-bottom: 10px;
        }

        .grid-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .shortcut-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--font-tech);
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .shortcut-btn:hover {
            border-color: var(--neon-purple);
            background-color: rgba(79, 172, 254, 0.1);
            color: var(--text-main);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        .shortcut-btn svg {
            width: 32px;
            height: 32px;
            fill: var(--text-muted);
            margin-bottom: 15px;
            transition: var(--transition);
        }
        
        .shortcut-btn:hover svg {
            fill: var(--neon-purple);
            filter: drop-shadow(0 0 5px var(--neon-purple));
        }

        /* --- WIDGET 1: PENSE-BÊTE CORRIGÉ (1 colonne) --- */
        .notes-card {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            border-left: 3px solid var(--neon-green);
        }
        
        .notes-card::after {
            background: var(--neon-green);
        }

        .notes-title {
            font-family: var(--font-tech);
            font-size: 0.8rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .notes-textarea {
            width: 100%;
            flex: 1;
            min-height: 120px;
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(15, 240, 179, 0.3);
            color: #ffffff !important;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 12px;
            resize: none;
            outline: none;
            border-radius: 2px;
        }

        .notes-textarea:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(15, 240, 179, 0.3) inset;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .clock-card, .search-card, .links-card, .status-card, .data-card, .notes-card {
                grid-column: span 2;
            }
        }
        
        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
            .clock-card, .search-card, .links-card, .status-card, .data-card, .notes-card {
                grid-column: span 1;
            }
            .grid-links { grid-template-columns: repeat(2, 1fr); }
            #time { font-size: 3rem; }
        }
    </style>
</head>
<body style="zoom: 110%;">

            <div class="card clock-card" style="width: 100%;">

        </a>

        <div class="card notes-card">
            <span class="notes-title">Bloc-notes</span>
            <textarea id="cyber-notes" class="notes-textarea" placeholder="Tape tes notes ici..."></textarea>
        </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            let dateStr = now.toLocaleDateString('fr-FR', options);
            dateStr = dateStr.replace(',', '').toUpperCase();
            document.getElementById('date').textContent = `> ${dateStr}`;
        }
        updateClock();
        setInterval(updateClock, 10000);
    </script>
    
    <script>
        async function getGapWeather() {
            const lat = 44.5588;
            const lon = 6.0792;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=Europe/Paris`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                const temperature = Math.round(data.current.temperature_2m);
                document.getElementById('weather-temp').innerText = `${temperature}°C`;
            } catch (error) {
                document.getElementById('weather-temp').innerText = "ERR";
            }
        }
        getGapWeather();
        setInterval(getGapWeather, 15 * 60 * 1000);
    </script>

    <script>
        // GESTION DU PENSE-BÊTE
        const notesArea = document.getElementById('cyber-notes');
        if (localStorage.getItem('cyberDashboardNotes')) {
            notesArea.value = localStorage.getItem('cyberDashboardNotes');
        }
        notesArea.addEventListener('input', () => {
            localStorage.setItem('cyberDashboardNotes', notesArea.value);
        });

        // FORCE-FOCUS
        function forceDashboardFocus() {
            const searchInput = document.querySelector('.search-input');
            if (!searchInput) return;
            searchInput.focus();
        }
        window.addEventListener('load', forceDashboardFocus);
    </script>

    <script>
        document.getElementById('search-form').addEventListener('submit', function(e) {
            const input = document.querySelector('.search-input').value.trim();
            
            // Regex pour vérifier s'il s'agit d'un domaine ou d'une URL (ex: google.com, http://..., localhost:8080)
            const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?($|:|\?)/i;
            const localhostPattern = /^localhost(:\d+)?/i;

            if (urlPattern.test(input) || localhostPattern.test(input)) {
                // On stoppe l'envoi vers Google
                e.preventDefault(); 
                
                // On s'assure que ça commence par http:// ou https:// pour pas que le navigateur croit que c'est un dossier local
                let targetUrl = input;
                if (!/^https?:\/\//i.test(input)) {
                    targetUrl = 'https://' + input;
                }
                
                // Ouvre l'adresse dans un nouvel onglet
                window.open(targetUrl, '_blank');
            }
            // Si c'est pas une URL, on laisse faire, le formulaire s'envoie normalement sur Google
        });
    </script>
